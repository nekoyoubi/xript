name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci

      - name: build sanitize
        run: npm run build --workspace=tools/sanitize
      - name: build validate
        run: npm run build --workspace=tools/validate
      - name: build typegen
        run: npm run build --workspace=tools/typegen
      - name: build docgen
        run: npm run build --workspace=tools/docgen
      - name: build init
        run: npm run build --workspace=tools/init
      - name: build cli
        run: npm run build --workspace=tools/cli
      - name: build runtime
        run: npm run build --workspace=runtimes/js
      - name: build runtime-node
        run: npm run build --workspace=runtimes/node

      - name: test sanitize
        run: npm test --workspace=tools/sanitize
      - name: test validate
        run: npm test --workspace=tools/validate
      - name: test typegen
        run: npm test --workspace=tools/typegen
      - name: test docgen
        run: npm test --workspace=tools/docgen
      - name: test init
        run: npm test --workspace=tools/init
      - name: test cli
        run: npm test --workspace=tools/cli
      - name: test runtime
        run: npm test --workspace=runtimes/js
      - name: test runtime-node
        run: npm test --workspace=runtimes/node

      - name: publish sanitize
        run: npm publish --workspace=tools/sanitize
      - name: publish validate
        run: npm publish --workspace=tools/validate
      - name: publish typegen
        run: npm publish --workspace=tools/typegen
      - name: publish docgen
        run: npm publish --workspace=tools/docgen
      - name: publish init
        run: npm publish --workspace=tools/init
      - name: publish cli
        run: npm publish --workspace=tools/cli
      - name: publish runtime
        run: npm publish --workspace=runtimes/js
      - name: publish runtime-node
        run: npm publish --workspace=runtimes/node
