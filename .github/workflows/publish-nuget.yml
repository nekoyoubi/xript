name: Publish to NuGet

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: build
        run: dotnet build runtimes/csharp/Xript.Runtime.sln --configuration Release

      - name: test
        run: dotnet test runtimes/csharp/Xript.Runtime.sln --configuration Release --no-build

      - name: pack
        run: dotnet pack runtimes/csharp/src/Xript.Runtime/Xript.Runtime.csproj --configuration Release --no-build

      - name: push
        run: dotnet nuget push runtimes/csharp/src/Xript.Runtime/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
